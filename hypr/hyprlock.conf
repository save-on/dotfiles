source = $HOME/.config/hypr/colors/system-theme.conf

# generalConfig
general {
    # fail_timeout=2000
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    ignore_empty_input = true
}

# backgroundConfig
background {
    monitor = 
    path = /home/saveon/Pictures/wallpaper/wallhaven-5wx7x5.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.0115
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.1
}

# inputFieldConfig
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $borderColor
    inner_color = $inputInnerColor
    font_color = $inputFontColor
    fade_on_empty = false
    font_family = JetBrains Mono
    placeholder_text = <i><span foreground="##ffffff99">おはよう、 $USER</span></i>
    check_color = $checkColor
    fail_color = $failColor
    hide_input = false
    position = 0, -290
    halign = center
    valign = center
}


# time
label {
    monitor = 
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = $timeFontColor
    font_size = 95
    font_family = JetBrains Mono
    position = 0, 200
    halign = center
    valign = center
}

# avatar
image {
    monitor =
    path = /home/saveon/Pictures/profile_pictures/wallhaven-d8gw3o.jpg 
    size = 160
    border_size = 3
    border_color = $borderColor
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = $shadowComplement
}


# topLeftCorner
label {
    monitor =
    text = ╭─
    color = $borderColor
    font_size = 20
    font_family = JetBrains Mono
    position = 15, -15
    halign = left
    valign = top
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadowColorDim
}

# topRightCorner
label {
    monitor =
    text = ─╮
    color = $borderColor
    font_size = 20
    font_family = JetBrains Mono
    position = -15, -15
    halign = right
    valign = top
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadowColorDim
}

# bottomLeftCorner
label {
    monitor =
    text = ╰─
    color = $borderColor
    font_size = 20
    font_family = JetBrains Mono
    position = 15, 15
    halign = left
    valign = bottom
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadowColorDim
}

# bottomRightCorner
label {
    monitor =
    text = ─╯
    color = $borderColor
    font_size = 20
    font_family = JetBrains Mono
    position = -15, 15
    halign = right
    valign = bottom
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadoColorDim
}

# cpuUsage
label {
    monitor =
    text = cmd[update:3000] echo "CPU: $(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1}' | cut -d. -f1)%"
    color = $utility
    font_size = 12
    font_family = JetBrains Mono
    position = -35, -37
    halign = right
    valign = top
    shadow_passes = 1
    shadow_size = 2
    shadow_color = $shadowColorBright
}

# ramUsage
label {
    monitor =
    text = cmd[update:3000] free | grep Mem | awk '{printf "RAM: %.0f%%", $3/$2 * 100.0}'
    color = $utility
    font_size = 12
    font_family = JetBrains Mono
    position = -35, -57
    halign = right
    valign = top
    shadow_passes = 1
    shadow_size = 2
    shadow_color = $shadowColorBright
}

#batterPercentage
label {
    monitor = 
        text = cmd[update:3000] upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep "percentage" | awk '{print "BAT: " $2}'
        color = $utility
        font_size = 12
        font_family = JetBrains Mono
        position = -35, -77
        halign = right
        valign = top
        shadow_passes = 1
        shadow_size = 2
        shadow_color = $shadowColorBright
}

#batteryState
label {
    monitor =
    text = cmd[update:3000] upower -i /org/freedesktop/UPower/devices/battery_BAT0 | awk '/state:/ {print $2}' | grep -q discharging && echo "" || echo "⚡︎ Charging"
    color = $utility
    font_size = 12
    font_family = JetBrains Mono
    position = -35, -97
    halign = right
    valign = top
    shadow_passes = 1
    shadow_size = 2
    shadow_color = $shadowColorBright
}
# systemUptime - bottomLeft
label {
    monitor =
    text = cmd[update:60000] uptime -p | sed 's/up //'
    color = $utility
    font_size = 12
    font_family = JetBrains Mono
    position = 35, 37
    halign = left
    valign = bottom
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(166, 227, 161, 0.4)
}

# metworkStatus - bottomRight
label {
    monitor =
    text = cmd[update:5000] timeout 1s bash -c 'if ping -c 1 -W 1 8.8.8.8 &>/dev/null; then echo "● Connected"; else echo "○ Offline"; fi'
    color = $utility
    font_size = 12
    font_family = JetBrains Mono
    position = -35, 37
    halign = right
    valign = bottom
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $shadowColorBright
}

# quotes
label {
    monitor =
    text = cmd[update:60000] shuf /home/saveon/.config/quotes.txt -n 1
    color = $quoteFontColor
    font_size = 12
    font_family = JetBrains Mono
    position = 35, -37
    halign = left
    valign = top
    shadow_passes = 2
    shadow_size = 3
    shadow_color = $shadowColorBright
}
